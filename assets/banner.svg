<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Dynamic floating particles -->
  <g fill="#10b981" opacity="0.4">
    <circle cx="80" cy="60" r="3">
      <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="140" r="4">
      <animate attributeName="cy" values="140;110;140" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="50" r="5">
      <animate attributeName="cy" values="50;70;50" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="150" r="2.5">
      <animate attributeName="cy" values="150;130;150" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="40" r="2">
      <animate attributeName="cy" values="40;55;40" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="160" r="3.5">
      <animate attributeName="cy" values="160;140;160" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="400" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">
    Synthetic Biology Designer
  </text>
  
  <text x="400" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="url(#textGrad)" text-anchor="middle">
    Interview Questions &amp; Preparation Guide
  </text>
  
  <!-- Pulse effect -->
  <circle cx="400" cy="170" r="4" fill="#3b82f6">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
